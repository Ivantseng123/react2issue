server:
  port: 8080

slack:
  bot_token: "xoxb-your-token"
  app_token: "xapp-your-app-token"

# Auto-bind: bot auto-registers when invited to a channel
auto_bind: true

channel_defaults:
  branch_select: true
  default_labels: ["from-slack"]

# Optional: override defaults for specific channels
# channels:
#   C05XXXXXX:
#     repos:
#       - "org/backend"
#       - "org/frontend"
#     default_labels: ["from-slack"]
#   C05YYYYYY:
#     repo: "org/backend-repo"
#     branch_select: true
#     branches: ["main", "develop"]

github:
  token: "ghp_your-token"

# === Agents ===
# CLI agents are spawned as subprocesses. Tried in provider order.
agents:
  claude:
    command: claude
    args: ["--print", "--output-format", "stream-json", "-p", "{prompt}"]
    timeout: 5m
    skill_dir: ".claude/skills"
    stream: true                  # enable stream-json event tracking
  opencode:
    command: opencode
    args: ["--prompt", "{prompt}"]
    timeout: 5m
    skill_dir: ".opencode/skills"
    stream: false
  # codex:
  #   command: codex
  #   args: ["{prompt}"]
  #   timeout: 5m
  # gemini:
  #   command: gemini
  #   args: ["--prompt", "{prompt}"]
  #   timeout: 5m

active_agent: claude
providers: [claude, opencode]

# === Prompt ===
prompt:
  language: "繁體中文"
  extra_rules:
    - "列出所有相關的檔案名稱與完整路徑"

repo_cache:
  dir: "/tmp/agentdock/repos"
  max_age: 1h

rate_limit:
  per_user: 5
  per_channel: 20
  window: 1h

max_thread_messages: 50

# === Queue ===
queue:
  capacity: 50               # max queued jobs before rejection
  transport: inmem            # inmem | nats | redis (future)
  job_timeout: 20m              # max job lifetime
  agent_idle_timeout: 5m        # stream-json agent: kill if no events
  prepare_timeout: 3m           # kill if stuck in preparing stage
  status_interval: 5s           # worker status report frequency

workers:
  count: 3                    # number of worker goroutines

# Channel priority: higher number = processed first
channel_priority:
  # C_INCIDENTS: 100          # production incidents get priority
  # C_ONCALL: 80
  default: 50

# === Logging ===
logging:
  dir: "logs"
  level: "debug"                  # file log level (stderr uses log_level above)
  retention_days: 30
  agent_output_dir: "logs/agent-outputs"

# Skills config (optional, for remote skill loading via ConfigMap)
# skills_config: "/etc/agentdock/skills.yaml"

# Optional: Mantis integration
# mantis:
#   base_url: https://mantis.example.com
#   api_token: your-token
