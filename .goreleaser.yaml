version: 2
project_name: agentdock

# gomod.proxy is intentionally disabled: go.mod declares `module agentdock`
# (a bare local name, not a URL), which GOPROXY cannot resolve. If the module
# path is ever changed to a full URL (e.g. github.com/Ivantseng123/agentdock),
# add `gomod: { proxy: true }` back for reproducible builds.

builds:
  - id: agentdock
    main: ./cmd/agentdock
    binary: agentdock
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - README.en.md
      - LICENSE
      - docs/MIGRATION-v1.md

checksum:
  name_template: 'checksums.txt'

changelog:
  disable: true   # release-please owns CHANGELOG.md; goreleaser must not contribute

dockers:
  - image_templates:
      - 'ghcr.io/ivantseng123/agentdock:{{ .Version }}-amd64'
    dockerfile: Dockerfile.release
    use: buildx
    goarch: amd64
    build_flag_templates:
      - --platform=linux/amd64
      - --cache-from=type=gha,scope=amd64
      - --cache-to=type=gha,mode=max,scope=amd64
      - --label=org.opencontainers.image.source=https://github.com/Ivantseng123/agentdock
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.created={{ .Date }}
    extra_files:
      - agents/skills

  - image_templates:
      - 'ghcr.io/ivantseng123/agentdock:{{ .Version }}-arm64'
    dockerfile: Dockerfile.release
    use: buildx
    goarch: arm64
    build_flag_templates:
      - --platform=linux/arm64
      - --cache-from=type=gha,scope=arm64
      - --cache-to=type=gha,mode=max,scope=arm64
      - --label=org.opencontainers.image.source=https://github.com/Ivantseng123/agentdock
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.created={{ .Date }}
    extra_files:
      - agents/skills

docker_manifests:
  - name_template: 'ghcr.io/ivantseng123/agentdock:{{ .Version }}'
    image_templates:
      - 'ghcr.io/ivantseng123/agentdock:{{ .Version }}-amd64'
      - 'ghcr.io/ivantseng123/agentdock:{{ .Version }}-arm64'
  - name_template: 'ghcr.io/ivantseng123/agentdock:{{ .Major }}.{{ .Minor }}'
    image_templates:
      - 'ghcr.io/ivantseng123/agentdock:{{ .Version }}-amd64'
      - 'ghcr.io/ivantseng123/agentdock:{{ .Version }}-arm64'
  - name_template: 'ghcr.io/ivantseng123/agentdock:{{ .Major }}'
    image_templates:
      - 'ghcr.io/ivantseng123/agentdock:{{ .Version }}-amd64'
      - 'ghcr.io/ivantseng123/agentdock:{{ .Version }}-arm64'
  - name_template: 'ghcr.io/ivantseng123/agentdock:latest'
    image_templates:
      - 'ghcr.io/ivantseng123/agentdock:{{ .Version }}-amd64'
      - 'ghcr.io/ivantseng123/agentdock:{{ .Version }}-arm64'

brews:
  - name: agentdock
    repository:
      owner: Ivantseng123
      name: homebrew-tap
      branch: main
      token: '{{ .Env.HOMEBREW_TAP_TOKEN }}'
      pull_request:
        enabled: true
    directory: Formula
    commit_author:
      name: Ivantseng123
      email: 170440613+Ivantseng123@users.noreply.github.com
    commit_msg_template: 'chore: bump agentdock to {{ .Tag }}'
    description: AgentDock — Slack-driven LLM agent orchestrator
    homepage: https://github.com/Ivantseng123/agentdock
    license: MIT
    install: |
      bin.install "agentdock"
    test: |
      system "#{bin}/agentdock", "--version"
    skip_upload: auto

release:
  github:
    owner: Ivantseng123
    name: agentdock
  mode: keep-existing   # append assets only; do NOT modify release body (release-please owns it)
