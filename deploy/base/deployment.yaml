apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentdock
spec:
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: agentdock
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            timeoutSeconds: 5
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: 100m
              memory: 512Mi
          envFrom:
            - secretRef:
                name: agentdock-secret
          volumeMounts:
            - name: repo-cache
              mountPath: /data/repos
      volumes:
        - name: repo-cache
          emptyDir:
            sizeLimit: 10Gi
  revisionHistoryLimit: 3
