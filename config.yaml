server:
  port: 8080

slack:
  bot_token: "xoxb-your-token"
  signing_secret: "your-signing-secret"
  app_token: "xapp-your-app-token"

channels:
  # Map Slack channel IDs to GitHub repos
  # C05XXXXXX:
  #   repo: "org/backend-repo"
  #   default_labels: ["from-slack"]

reactions:
  bug:
    type: "bug"
    issue_labels: ["bug", "triage"]
    issue_title_prefix: "[Bug]"
  rocket:
    type: "feature"
    issue_labels: ["enhancement"]
    issue_title_prefix: "[Feature]"

github:
  token: "ghp_your-token"

llm:
  providers:
    - name: "claude"
      api_key: "sk-ant-your-key"
      model: "claude-sonnet-4-20250514"
      base_url: "https://api.anthropic.com"
    # - name: "openai"
    #   api_key: "sk-your-key"
    #   model: "gpt-4o"
    #   base_url: "https://api.openai.com"
  timeout: 30s
  max_retries: 2

repo_cache:
  dir: "/tmp/slack-issue-bot/repos"
  max_age: 1h

rate_limit:
  per_user: 5         # Max triggers per user per window
  per_channel: 20     # Max triggers per channel per window
  window: 1h          # Time window

# "full" = use centralized LLM for diagnosis (costs tokens)
# "lite" = grep only + handoff spec (zero token cost, user runs own AI)
diagnosis:
  mode: "lite"
